<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component | Assignment 4</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <main class="wrap">

  <section class="score-container">

  <h2 class="score-header">Your Result</h2>

  <div class="score-circle">
  <span class="score-number">76</span>
  <span  class="score-total">of 100</span>
  </div>

  <h3>Great</h3>
  <p class="score-note">You scored higher than 65% of the people who have taken these tests.
  </p> 
  </section>
    
 


  <section class="summary-container">
  <h2>Summary</h2> 

 <div class="summary-list">

  
      <div class="row reaction">
        <div class="left">
          <img src="./assets/images/icon-reaction.svg" alt="Reaction icon">
          <span>Reaction</span>
        </div>
        <div class="right"><strong>80</strong> / 100</div>
      </div>
  
 <div class="row memory">
        <div class="left">
          <img src="./assets/images/icon-memory.svg" alt="Memory icon">
          <span>Memory</span>
        </div>
        <div class="right"><strong>92</strong> / 100</div>
      </div>

      <div class="row verbal">
        <div class="left">
          <img src="./assets/images/icon-verbal.svg" alt="Verbal icon">
          <span>Verbal</span>
        </div>
        <div class="right"><strong>61</strong> / 100</div>
      </div>

      <div class="row visual">
        <div class="left">
          <img src="./assets/images/icon-visual.svg" alt="Visual icon">
          <span>Visual</span>
        </div>
        <div class="right"><strong>72</strong> / 100</div>
      </div>

    </div>

 <button>Continue</button>

  </section>

  
</main>
  <footer>
    <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Warda</a>.
  </div>

  </footer>
  
  
</body>
</html>
